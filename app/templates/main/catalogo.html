{% extends "base.html" %}
{% block title %}Catálogo{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Catálogo Mercadona</h1>
        <p class="page-subtitle">4.322 productos disponibles</p>
    </div>
</div>

<div class="search-bar-wrap">
    <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Buscar producto…"
        autocomplete="off"
    >
    <select id="cat-select" class="cat-select">
        <option value="">Todas las categorías</option>
        {% for cat in categorias %}
        <option value="{{ cat.id_categoria }}">{{ cat.nombre }}</option>
        {% endfor %}
    </select>
    <button id="add-selected-btn" type="button" class="btn-primary" disabled>
        Añadir seleccionados (0)
    </button>
</div>

<p id="catalogo-feedback" class="search-hint" style="display:none;"></p>

<div id="resultados" class="productos-grid catalogo-grid">
    <p class="search-hint">Escribe al menos 2 caracteres para buscar…</p>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {   
    const searchInput = document.getElementById('search-input');
    const catSelect   = document.getElementById('cat-select');
    const resultados  = document.getElementById('resultados');
    const feedbackEl  = document.getElementById('catalogo-feedback');
    const addSelectedBtn = document.getElementById('add-selected-btn');
    let debounceTimer;

    function getCsrfToken() {
        return document.querySelector('meta[name="csrf-token"]')?.content || '';
    }

    function mostrarFeedback(texto, esError = false) {
        feedbackEl.textContent = texto;
        feedbackEl.style.display = 'block';
        feedbackEl.style.color = esError ? 'var(--danger)' : 'var(--accent)';
        clearTimeout(mostrarFeedback.timer);
        mostrarFeedback.timer = setTimeout(() => {
            feedbackEl.style.display = 'none';
        }, 2200);
    }

    function actualizarBotonSeleccion() {
        const totalSeleccionados = resultados.querySelectorAll('.producto-card--catalogo.selected').length;
        addSelectedBtn.disabled = totalSeleccionados === 0;
        addSelectedBtn.textContent = `Añadir seleccionados (${totalSeleccionados})`;
    }

    function toggleSeleccion(card) {
        if (!card || card.classList.contains('comprado')) return;
        card.classList.toggle('selected');
        actualizarBotonSeleccion();
    }

    async function addProductoById(idProducto) {
        const res = await fetch('/api/lista/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCsrfToken(),
            },
            body: JSON.stringify({ id_producto: idProducto }),
        });
        const data = await res.json();

        if (!res.ok || !data.ok) {
            throw new Error(data.message || 'No se pudo añadir el producto');
        }

        return data;
    }

    async function addSeleccionados() {
        const seleccionados = Array.from(resultados.querySelectorAll('.producto-card--catalogo.selected'));
        if (!seleccionados.length) return;

        addSelectedBtn.disabled = true;
        let addedCount = 0;
        let alreadyCount = 0;

        try {
            for (const card of seleccionados) {
                const idProducto = Number(card.dataset.productoId);
                if (!idProducto) continue;

                const data = await addProductoById(idProducto);
                if (data.added) {
                    addedCount += 1;
                } else {
                    alreadyCount += 1;
                }

                card.classList.remove('selected');
                card.classList.add('comprado');
            }

            mostrarFeedback(`Añadidos: ${addedCount}. Ya existentes: ${alreadyCount}.`);
        } catch (err) {
            mostrarFeedback(err.message || 'Error al añadir productos', true);
        } finally {
            actualizarBotonSeleccion();
        }
    }

    function buscar() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
            const q   = searchInput.value.trim();
            const cat = catSelect.value;

            if (q.length < 2 && !cat) {
                resultados.innerHTML = '<p class="search-hint">Escribe al menos 2 caracteres para buscar…</p>';
                return;
            }

            resultados.innerHTML = '<p class="search-hint">Buscando…</p>';
            const params = new URLSearchParams({ q, categoria: cat });
            const res = await fetch(`/api/productos?${params}`);
            const items = await res.json();

            if (!items.length) {
                resultados.innerHTML = '<p class="search-hint">Sin resultados.</p>';
                actualizarBotonSeleccion();
                return;
            }

            resultados.innerHTML = items.map(p => `
                <div class="producto-card producto-card--catalogo" data-producto-id="${p.id_producto}" role="button" tabindex="0" aria-label="Seleccionar ${p.nombre} para añadir a la lista">
                    <div class="producto-img-wrap">
                        <img src="${p.url_imagen}" alt="${p.nombre}" class="producto-img" loading="lazy"
                            onerror="this.src='/static/img/placeholder.svg'">
                    </div>
                    <div class="producto-info">
                        <span class="producto-cat-badge">${p.categoria}</span>
                        <p class="producto-nombre">${p.nombre}</p>
                    </div>
                </div>
            `).join('');

            actualizarBotonSeleccion();
        }, 300);
    }

    searchInput.addEventListener('input', buscar);
    catSelect.addEventListener('change', buscar);

    resultados.addEventListener('click', (e) => {
        const card = e.target.closest('.producto-card--catalogo');
        if (!card) return;
        toggleSeleccion(card);
    });

    resultados.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const card = e.target.closest('.producto-card--catalogo');
        if (!card) return;
        e.preventDefault();
        toggleSeleccion(card);
    });

    addSelectedBtn.addEventListener('click', addSeleccionados);

});
</script>
{% endblock %}
